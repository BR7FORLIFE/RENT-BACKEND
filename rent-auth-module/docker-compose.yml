services: 
  auth-database:
    image: mongo:noble
    container_name: auth-mongo
    ports:
      - 27017:27017
    volumes: 
      - mongo_data:/data/db
    env_file:
      - rent-auth-module/.env

  cache: 
    image: redis:8
    container_name: auth-cache
    ports: 
      - 6379:6379
    volumes: 
      - redis-data:/data

volumes: 
  mongo_data:
  redis-data: